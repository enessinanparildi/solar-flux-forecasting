project: solar_flux
provider: local

registry: ../data/feast/registry.db

offline_store:
    type: file                          # local parquet — swap to redshift/bigquery for prod

online_store:
    type: sqlite
    path: ../data/feast/online_store.db # swap to dynamodb/redis for prod

entity_key_serialization_version: 2

